<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samihs daily task tracker</title>

<style>
:root {
    --bg:#0f0f0f;
    --card:#1c1c1c;
    --task:#2a2a2a;
    --text:white;
    --barbg:#333;
    --barfill:#4caf50;
}

.light {
    --bg:#f2f2f2;
    --card:white;
    --task:#e6e6e6;
    --text:black;
    --barbg:#ddd;
    --barfill:#2ecc71;
}

body {
    font-family: Arial;
    background:var(--bg);
    color:var(--text);
    text-align:center;
    margin:0;
    padding:20px;
    transition:0.3s;
}

.container {
    max-width:450px;
    margin:auto;
    background:var(--card);
    padding:20px;
    border-radius:12px;
}

.task {
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:var(--task);
    padding:10px;
    margin:10px 0;
    border-radius:8px;
}

button {
    border:none;
    padding:8px;
    border-radius:8px;
    cursor:pointer;
}

.doneBtn { background:#4caf50;color:white; }

.iconBar {
    position:fixed;
    top:10px;
    right:10px;
    display:flex;
    gap:10px;
}

.iconBtn {
    background:#333;
    color:white;
    padding:10px;
    border-radius:8px;
}

.panel, .calendarPanel {
    display:none;
    position:fixed;
    top:50px;
    right:10px;
    background:var(--card);
    padding:15px;
    border-radius:10px;
    width:260px;
}

input, select {
    width:100%;
    padding:8px;
    margin-top:8px;
    border-radius:6px;
    border:none;
}

.addBtn{background:#4caf50;color:white;width:100%;margin-top:10px;}
.removeBtn{background:#ff4444;color:white;width:100%;margin-top:10px;}
.toggleBtn{background:#444;color:white;width:100%;margin-top:10px;}

.stats { margin-top:10px; }

/* XP BAR */
.xpWrap {
    margin-top:10px;
}

.xpBar {
    width:100%;
    height:14px;
    background:var(--barbg);
    border-radius:10px;
    overflow:hidden;
}

.xpFill {
    height:100%;
    width:0%;
    background:var(--barfill);
    transition:0.3s;
}

.levelText {
    margin-top:6px;
    font-size:14px;
}

.done { text-decoration:line-through; opacity:0.6; }

/* heatmap */
.heatmap {
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:4px;
    margin-top:10px;
}

.cell {
    width:100%;
    aspect-ratio:1;
    border-radius:4px;
    background:#333;
}

.cell.low { background:#1f3b1f; }
.cell.mid { background:#2ecc71; }
.cell.high { background:#00ff88; }
</style>
</head>

<body>

<h1 id="title">🔥 Samihs daily task tracker</h1>

<div class="container">

<div class="stats" id="streak">Streak: 0 🔥</div>

<div class="xpWrap">
    <div class="xpBar">
        <div class="xpFill" id="xpFill"></div>
    </div>
    <div class="levelText" id="levelText">Level 0</div>
</div>

<div id="tasks"></div>

</div>

<!-- ICONS -->
<div class="iconBar">
    <button class="iconBtn" onclick="toggleCalendar()">📅</button>
    <button class="iconBtn" onclick="togglePanel()">⚙️</button>
</div>

<!-- SETTINGS -->
<div class="panel" id="panel">
<h3>Settings</h3>

<h4>Change Title</h4>
<input id="titleInput">
<button class="addBtn" onclick="changeTitle()">Update</button>

<h4>Theme</h4>
<button class="toggleBtn" onclick="toggleTheme()">Toggle Light/Dark</button>

<h4>Add Task</h4>
<input id="newTask">
<button class="addBtn" onclick="addTask()">Add</button>

<h4>Remove Task</h4>
<select id="removeSelect"></select>
<button class="removeBtn" onclick="removeTask()">Remove</button>
</div>

<!-- CALENDAR -->
<div class="calendarPanel" id="calendar">
<h3>📅 Activity Heatmap</h3>
<div class="heatmap" id="heatmap"></div>
<p style="font-size:12px;opacity:0.7;">Last 28 days</p>
</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [
 {name:"School",done:false},
 {name:"Workout",done:false},
 {name:"Study",done:false},
 {name:"Eat well",done:false}
];

let xp = +localStorage.getItem("xp") || 0;
let streak = +localStorage.getItem("streak") || 0;
let history = JSON.parse(localStorage.getItem("history")) || {};
let lastDate = localStorage.getItem("lastDate");

let today = new Date().toDateString();

// DAILY RESET
if(lastDate !== today){

    let yesterday = new Date();
    yesterday.setDate(yesterday.getDate()-1);

    let allDone = tasks.every(t=>t.done);

    if(lastDate === yesterday.toDateString() && allDone){
        streak++;
    } else {
        streak = 1;
    }

    history[yesterday.toDateString()] = xp;

    tasks.forEach(t=>t.done=false);

    localStorage.setItem("history",JSON.stringify(history));
    localStorage.setItem("streak",streak);
    localStorage.setItem("lastDate",today);
    localStorage.setItem("tasks",JSON.stringify(tasks));
}

function render(){

    let c=document.getElementById("tasks");
    c.innerHTML="";

    tasks.forEach((t,i)=>{
        let d=document.createElement("div");
        d.className="task";

        let s=document.createElement("span");
        s.innerText=t.name;
        if(t.done)s.classList.add("done");

        let b=document.createElement("button");
        b.className="doneBtn";
        b.innerText=t.done?"Undo":"Done";

        b.onclick=()=>{
            tasks[i].done=!t.done;

            if(tasks[i].done) xp+=10;
            else xp-=10;

            save();
            render();
        };

        d.appendChild(s);
        d.appendChild(b);
        c.appendChild(d);
    });

    updateXPBar();
    document.getElementById("streak").innerText=`Streak: ${streak} 🔥`;

    updateDropdown();
    renderHeatmap();
}

function updateXPBar(){
    let level = Math.floor(xp/100);
    let progress = xp % 100;

    document.getElementById("levelText").innerText =
        `Level ${level}`;

    document.getElementById("xpFill").style.width =
        `${progress}%`;
}

function renderHeatmap(){

    let map=document.getElementById("heatmap");
    map.innerHTML="";

    for(let i=27;i>=0;i--){

        let d=new Date();
        d.setDate(d.getDate()-i);

        let key=d.toDateString();
        let val=history[key]||0;

        let cell=document.createElement("div");
        cell.className="cell";

        if(val>=40)cell.classList.add("high");
        else if(val>=20)cell.classList.add("mid");
        else if(val>0)cell.classList.add("low");

        map.appendChild(cell);
    }
}

function save(){
    localStorage.setItem("tasks",JSON.stringify(tasks));
    localStorage.setItem("xp",xp);
}

function addTask(){
    let v=document.getElementById("newTask").value;
    if(!v.trim())return;
    tasks.push({name:v,done:false});
    save();render();
}

function removeTask(){
    let i=document.getElementById("removeSelect").value;
    tasks.splice(i,1);
    save();render();
}

function updateDropdown(){
    let s=document.getElementById("removeSelect");
    s.innerHTML="";
    tasks.forEach((t,i)=>{
        let o=document.createElement("option");
        o.value=i;
        o.innerText=t.name;
        s.appendChild(o);
    });
}

function togglePanel(){
    let p=document.getElementById("panel");
    p.style.display=p.style.display==="block"?"none":"block";
}

function toggleCalendar(){
    let c=document.getElementById("calendar");
    c.style.display=c.style.display==="block"?"none":"block";
}

function changeTitle(){
    let t=document.getElementById("titleInput").value;
    if(!t.trim())return;
    document.getElementById("title").innerText=t;
    localStorage.setItem("title",t);
}

function toggleTheme(){
    document.body.classList.toggle("light");
}

render();

</script>

</body>
</html>
