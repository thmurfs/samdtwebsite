<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samihs daily task tracker</title>

<style>
:root {
    --bg: #0f0f0f;
    --card: #1c1c1c;
    --task: #2a2a2a;
    --text: white;
}

.light {
    --bg: #f2f2f2;
    --card: white;
    --task: #e6e6e6;
    --text: black;
}

body {
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    text-align: center;
    margin: 0;
    padding: 20px;
    transition: 0.3s;
}

h1 {
    margin-top: 20px;
}

.container {
    max-width: 420px;
    margin: auto;
    background: var(--card);
    padding: 20px;
    border-radius: 12px;
}

.task {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--task);
    padding: 10px;
    border-radius: 8px;
    margin: 10px 0;
}

button {
    border: none;
    padding: 8px;
    border-radius: 8px;
    cursor: pointer;
}

.doneBtn {
    background: #4caf50;
    color: white;
}

#settingsBtn {
    position: fixed;
    top: 10px;
    right: 10px;
    background: #333;
    color: white;
}

.panel {
    display: none;
    position: fixed;
    top: 50px;
    right: 10px;
    background: var(--card);
    padding: 15px;
    border-radius: 10px;
    width: 250px;
    text-align: left;
}

input, select {
    width: 100%;
    padding: 8px;
    margin-top: 8px;
    border-radius: 6px;
    border: none;
}

.addBtn {
    background: #4caf50;
    color: white;
    width: 100%;
    margin-top: 10px;
}

.removeBtn {
    background: #ff4444;
    color: white;
    width: 100%;
    margin-top: 10px;
}

.toggleBtn {
    background: #444;
    color: white;
    width: 100%;
    margin-top: 10px;
}

.progress {
    margin-top: 15px;
}

.streak {
    margin-top: 10px;
    font-size: 18px;
}

.done {
    text-decoration: line-through;
    opacity: 0.6;
}
</style>
</head>

<body>

<h1 id="title">🔥 Samihs daily task tracker</h1>

<div class="container">

<div class="streak" id="streak">Streak: 0 🔥</div>

<div id="tasks"></div>

<div class="progress" id="progress"></div>

</div>

<button id="settingsBtn" onclick="togglePanel()">⚙️</button>

<div class="panel" id="panel">

    <h3>Settings</h3>

    <!-- Change Title -->
    <h4>Change Title</h4>
    <input id="titleInput" placeholder="New title...">
    <button class="addBtn" onclick="changeTitle()">Update Title</button>

    <!-- Theme -->
    <h4>Theme</h4>
    <button class="toggleBtn" onclick="toggleTheme()">Toggle Light/Dark</button>

    <!-- Add Task -->
    <h4>Add Task</h4>
    <input id="newTask" placeholder="New task...">
    <button class="addBtn" onclick="addTask()">Add</button>

    <!-- Remove Task -->
    <h4>Remove Task</h4>
    <select id="removeSelect"></select>
    <button class="removeBtn" onclick="removeTask()">Remove</button>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [
    { name: "Go to school", done: false },
    { name: "Workout or move", done: false },
    { name: "Do homework / learn", done: false },
    { name: "Eat decent meals", done: false },
    { name: "No bad habits", done: false }
];

let streak = parseInt(localStorage.getItem("streak")) || 0;
let lastDate = localStorage.getItem("lastDate");

let today = new Date().toDateString();

// streak system
if (lastDate !== today) {
    let yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);

    if (lastDate === yesterday.toDateString()) {
        streak++;
    } else {
        streak = 1;
    }

    localStorage.setItem("streak", streak);
    localStorage.setItem("lastDate", today);
}

// load saved title
let savedTitle = localStorage.getItem("title");
if (savedTitle) {
    document.getElementById("title").innerText = savedTitle;
}

// load theme
if (localStorage.getItem("theme") === "light") {
    document.body.classList.add("light");
}

function render() {
    let container = document.getElementById("tasks");
    container.innerHTML = "";

    tasks.forEach((task, i) => {
        let div = document.createElement("div");
        div.className = "task";

        let label = document.createElement("span");
        label.innerText = task.name;
        if (task.done) label.classList.add("done");

        let btn = document.createElement("button");
        btn.innerText = task.done ? "Undo" : "Done";
        btn.className = "doneBtn";
        btn.onclick = () => {
            tasks[i].done = !tasks[i].done;
            save();
            render();
        };

        div.appendChild(label);
        div.appendChild(btn);
        container.appendChild(div);
    });

    document.getElementById("progress").innerText =
        `Progress: ${tasks.filter(t => t.done).length} / ${tasks.length}`;

    document.getElementById("streak").innerText =
        `Streak: ${streak} 🔥`;

    updateDropdown();
}

function save() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

function addTask() {
    let input = document.getElementById("newTask");
    if (!input.value.trim()) return;

    tasks.push({ name: input.value, done: false });
    input.value = "";
    save();
    render();
}

function removeTask() {
    let index = document.getElementById("removeSelect").value;
    tasks.splice(index, 1);
    save();
    render();
}

function updateDropdown() {
    let select = document.getElementById("removeSelect");
    select.innerHTML = "";

    tasks.forEach((t, i) => {
        let opt = document.createElement("option");
        opt.value = i;
        opt.innerText = t.name;
        select.appendChild(opt);
    });
}

function togglePanel() {
    let panel = document.getElementById("panel");
    panel.style.display = panel.style.display === "block" ? "none" : "block";
}

function changeTitle() {
    let newTitle = document.getElementById("titleInput").value;
    if (!newTitle.trim()) return;

    document.getElementById("title").innerText = newTitle;
    localStorage.setItem("title", newTitle);
}

function toggleTheme() {
    document.body.classList.toggle("light");

    if (document.body.classList.contains("light")) {
        localStorage.setItem("theme", "light");
    } else {
        localStorage.setItem("theme", "dark");
    }
}

render();

</script>

</body>
</html>
