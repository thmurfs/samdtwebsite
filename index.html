<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samihs daily task tracker</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
    text-align: center;
    margin: 0;
    padding: 20px;
}

h1 {
    margin-top: 20px;
}

.container {
    max-width: 420px;
    margin: auto;
    background: #1c1c1c;
    padding: 20px;
    border-radius: 12px;
}

.task {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #2a2a2a;
    padding: 10px;
    border-radius: 8px;
    margin: 10px 0;
}

button {
    border: none;
    padding: 8px;
    border-radius: 8px;
    cursor: pointer;
}

.doneBtn {
    background: #4caf50;
    color: white;
}

.deleteBtn {
    background: #ff4444;
    color: white;
    margin-left: 5px;
}

#settingsBtn {
    position: fixed;
    top: 10px;
    right: 10px;
    background: #333;
    color: white;
}

.panel {
    display: none;
    position: fixed;
    top: 50px;
    right: 10px;
    background: #222;
    padding: 15px;
    border-radius: 10px;
    width: 240px;
    text-align: left;
}

input, select {
    width: 100%;
    padding: 8px;
    margin-top: 10px;
    border-radius: 6px;
    border: none;
}

.addBtn {
    background: #4caf50;
    color: white;
    width: 100%;
    margin-top: 10px;
}

.removeBtn {
    background: #ff4444;
    color: white;
    width: 100%;
    margin-top: 10px;
}

.progress {
    margin-top: 15px;
}

.streak {
    margin-top: 10px;
    font-size: 18px;
}

.done {
    text-decoration: line-through;
    opacity: 0.6;
}
</style>
</head>

<body>

<h1>🔥 Samihs daily task tracker</h1>

<div class="container">

<div class="streak" id="streak">Streak: 0 🔥</div>

<div id="tasks"></div>

<div class="progress" id="progress"></div>

</div>

<button id="settingsBtn" onclick="togglePanel()">⚙️</button>

<div class="panel" id="panel">
    <h3>Settings</h3>

    <h4>Add Task</h4>
    <input id="newTask" placeholder="New task...">
    <button class="addBtn" onclick="addTask()">Add</button>

    <h4 style="margin-top:15px;">Remove Task</h4>
    <select id="removeSelect"></select>
    <button class="removeBtn" onclick="removeTask()">Remove</button>
</div>

<script>
let defaultTasks = [
    "Go to school",
    "Workout or move",
    "Do homework / learn",
    "Eat decent meals",
    "No bad habits"
];

let tasks = JSON.parse(localStorage.getItem("tasks")) ||
defaultTasks.map(t => ({ name: t, done: false }));

let streak = parseInt(localStorage.getItem("streak")) || 0;
let lastDate = localStorage.getItem("lastDate");

let today = new Date().toDateString();

// streak logic
if (lastDate !== today) {
    let yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);

    if (lastDate === yesterday.toDateString()) {
        streak += 1;
    } else {
        streak = 1;
    }

    localStorage.setItem("lastDate", today);
    localStorage.setItem("streak", streak);
}

function render() {
    const container = document.getElementById("tasks");
    container.innerHTML = "";

    tasks.forEach((task, index) => {
        let div = document.createElement("div");
        div.className = "task";

        let label = document.createElement("span");
        label.innerText = task.name;
        if (task.done) label.classList.add("done");

        let doneBtn = document.createElement("button");
        doneBtn.innerText = task.done ? "Undo" : "Done";
        doneBtn.className = "doneBtn";
        doneBtn.onclick = () => {
            tasks[index].done = !tasks[index].done;
            save();
            render();
        };

        div.appendChild(label);
        div.appendChild(doneBtn);

        container.appendChild(div);
    });

    let doneCount = tasks.filter(t => t.done).length;
    document.getElementById("progress").innerText =
        `Progress: ${doneCount} / ${tasks.length}`;

    document.getElementById("streak").innerText =
        `Streak: ${streak} 🔥`;

    updateRemoveDropdown();
}

function save() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

function addTask() {
    let input = document.getElementById("newTask");
    if (input.value.trim() === "") return;

    tasks.push({ name: input.value, done: false });
    input.value = "";
    save();
    render();
}

function removeTask() {
    let select = document.getElementById("removeSelect");
    let index = select.value;

    if (index === "") return;

    tasks.splice(index, 1);
    save();
    render();
}

function updateRemoveDropdown() {
    let select = document.getElementById("removeSelect");
    select.innerHTML = "";

    tasks.forEach((task, index) => {
        let option = document.createElement("option");
        option.value = index;
        option.text = task.name;
        select.appendChild(option);
    });
}

function togglePanel() {
    let panel = document.getElementById("panel");
    panel.style.display = panel.style.display === "block" ? "none" : "block";
}

render();
</script>

</body>
</html>
